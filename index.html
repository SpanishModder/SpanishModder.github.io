<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bru.dev</title>
  <meta name="description" content="Game developer & front-end dev. Portfolio and projects.">
  <link rel="canonical" href="https://spanishmodder.github.io/">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --fg: #d4d4d4;
      --dim: #555;
      --accent: #e8e8e8;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      width: 100%;
      max-width: 360px;
    }

    .header {
      margin-bottom: 2rem;
    }

    .name {
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .tagline {
      color: var(--dim);
      margin-top: 0.25rem;
      font-size: 0.85rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #222;
      margin: 1.5rem 0;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }

    .link-row a {
      color: var(--fg);
      text-decoration: none;
      transition: color 0.15s;
    }

    .link-row a:hover {
      color: var(--accent);
    }

    .link-row a::before {
      content: '→ ';
      color: var(--dim);
    }

    .link-desc {
      color: var(--dim);
      font-size: 0.8rem;
      text-align: right;
      white-space: nowrap;
    }

    footer {
      margin-top: 2rem;
      color: var(--dim);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <div class="name">bru.dev</div>
      <div class="tagline">game developer / front-end</div>
    </div>

    <hr class="divider">

    <nav>
      <div class="link-row">
        <a href="/portfolio/">portfolio</a>
        <span class="link-desc">projects & work</span>
      </div>
      <div class="link-row">
        <a href="/black_flag_games/">black flag games</a>
        <span class="link-desc">game downloader</span>
      </div>
    </nav>

    <hr class="divider">

    <footer>
      spanishmodder.github.io
    </footer>
  </main>
</body>
</html>
